name: Aftertalk
options:
  bundleIdPrefix: com.theaayushstha
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: "YES"
    SWIFT_UPCOMING_FEATURE_INTERNAL_IMPORTS_BY_DEFAULT: "YES"
    DEVELOPMENT_TEAM: LPAWL44K53
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

packages:
  Moonshine:
    url: https://github.com/moonshine-ai/moonshine-swift.git
    from: 0.0.59
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: 0.12.0

targets:
  Aftertalk:
    type: application
    platform: iOS
    sources:
      - path: Aftertalk
        excludes:
          - "Models/**"
          - "Resources/Models/**"
      - path: Aftertalk/Models
        type: folder
        buildPhase: resources
      - path: Aftertalk/Resources/Models/parakeet-tdt-0.6b-v2
        type: folder
        buildPhase: resources
        optional: true
      - path: Aftertalk/Resources/Models/kokoro-82m-coreml
        type: folder
        buildPhase: resources
        optional: true
      - path: Aftertalk/Resources/Models/speaker-diarization-coreml
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - package: Moonshine
        product: MoonshineVoice
      - package: FluidAudio
        product: FluidAudio
    info:
      path: Aftertalk/Info.plist
      properties:
        CFBundleDisplayName: Aftertalk
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "Aftertalk records meetings on-device. Audio never leaves your phone."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Surfaces ~/Documents (where SessionPerfSampler writes per-session
        # CSVs) in the Files app so the user can AirDrop / iCloud-export
        # the perf data for chart rendering. Without this key, Files app
        # only sees apps that explicitly opt in.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theaayushstha.aftertalk
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ENABLE_PREVIEWS: "YES"

  AftertalkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AftertalkTests
    dependencies:
      - target: Aftertalk
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theaayushstha.aftertalkTests
        TARGETED_DEVICE_FAMILY: "1"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Aftertalk.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Aftertalk"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Aftertalk:
    build:
      targets:
        Aftertalk: all
        AftertalkTests: [test]
    test:
      targets:
        - AftertalkTests
      gatherCoverageData: false
    run:
      config: Debug

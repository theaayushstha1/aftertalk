<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Aftertalk">
  <title>Aftertalk</title>
  <desc>Aftertalk brand mark. Four vertical bars decreasing in height followed by a precise dot — sound decaying into the silence after a conversation, with the dot representing the memory that persists. Transparent background; ink #1B1B1F.</desc>
  <defs>
    <linearGradient id="barInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22222A"/>
      <stop offset="100%" stop-color="#101015"/>
    </linearGradient>
  </defs>
  <g fill="url(#barInk)">
    <rect x="152" y="232" width="96" height="560" rx="8"/>
    <rect x="280" y="312" width="96" height="400" rx="8"/>
    <rect x="408" y="392" width="96" height="240" rx="8"/>
    <rect x="536" y="472" width="96" height="80"  rx="8"/>
  </g>
  <circle cx="720" cy="512" r="44" fill="#15151A"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Aftertalk social preview">
  <title>Aftertalk — social preview card</title>
  <desc>1280×640 GitHub repo social preview. Brand mark on the left, wordmark + tagline on the right, Quiet Studio cream ground.</desc>
  <rect width="1280" height="640" fill="#F5E7D0"/>
  <g transform="translate(120, 130)" fill="#1B1B1F">
    <rect x="0"   y="0"   width="48" height="380" rx="4"/>
    <rect x="80"  y="56"  width="48" height="270" rx="4"/>
    <rect x="160" y="112" width="48" height="160" rx="4"/>
    <rect x="240" y="166" width="48" height="50"  rx="4"/>
    <circle cx="345" cy="190" r="22"/>
  </g>
  <text x="560" y="305"
        fill="#1B1B1F"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="96"
        font-weight="700"
        letter-spacing="-3">Aftertalk</text>
  <text x="560" y="365"
        fill="#1B1B1F"
        opacity="0.62"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="30"
        font-weight="400"
        letter-spacing="-0.4">Meeting memory that never leaves your phone.</text>
  <text x="560" y="425"
        fill="#1B1B1F"
        opacity="0.45"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="22"
        font-weight="500"
        letter-spacing="0.3">FULLY OFFLINE  ·  IPHONE  ·  ON-DEVICE AI</text>
</svg>
